<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 350" width="250" height="350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#312e81;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1.5" fill="#ffffff" opacity="0.06" />
    </pattern>
  </defs>
  <!-- Card background -->
  <rect width="250" height="350" rx="12" ry="12" fill="url(#bg)" />
  <!-- Dot pattern overlay -->
  <rect width="250" height="350" rx="12" ry="12" fill="url(#dots)" />
  <!-- Shine overlay -->
  <rect width="250" height="350" rx="12" ry="12" fill="url(#shine)" />
  <!-- Border -->
  <rect x="1" y="1" width="248" height="348" rx="11" ry="11" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.6" />
  <!-- Inner border -->
  <rect x="8" y="8" width="234" height="334" rx="8" ry="8" fill="none" stroke="#6366f1" stroke-width="0.75" opacity="0.3" />
  <!-- Center diamond -->
  <polygon points="125,110 165,150 125,190 85,150" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.5" />
  <polygon points="125,125 150,150 125,175 100,150" fill="#4f46e5" opacity="0.3" />
  <!-- Pack Ripper wordmark -->
  <text x="125" y="230" font-family="monospace" font-size="13" font-weight="bold" fill="#a5b4fc" text-anchor="middle" letter-spacing="3">PACK RIPPER</text>
  <text x="125" y="248" font-family="monospace" font-size="8" fill="#6366f1" text-anchor="middle" letter-spacing="2">SIMULATOR</text>
</svg>
